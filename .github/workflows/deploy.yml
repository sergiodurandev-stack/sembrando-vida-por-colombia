name: Deploy to Hosting (FTP)

# Runs automatically on every push to main
on:
  push:
    branches:
      - main

  # Allow triggering manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Upload to server via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # ── SECRETS ─────────────────────────────────────────────────────────
          # Add these in: GitHub repo → Settings → Secrets and variables → Actions
          #
          #   FTP_SERVER    →  ftp.tudominio.com  (or IP of your hosting)
          #   FTP_USERNAME  →  tu_usuario_ftp
          #   FTP_PASSWORD  →  tu_contraseña_ftp
          # ────────────────────────────────────────────────────────────────────
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # Remote directory on your server (adjust if needed)
          # Common values: /public_html/  or  /www/  or  /httpdocs/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/public_html/' }}

          # Only upload files that changed (faster deploys after first run)
          dangerous-clean-slate: false

          # Show detailed upload log
          log-level: verbose

          # Exclude files that should never go to production
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
