name: Deploy to Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload to Namecheap via FTPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # ── SECRETS REQUERIDOS ───────────────────────────────────────────────
          # GitHub repo → Settings → Secrets and variables → Actions → New secret
          #
          #  FTP_SERVER    → El servidor FTP de Namecheap.
          #                  Encuéntralo en: cPanel → FTP Accounts → Configure FTP Client
          #                  Ejemplo: ftp.sembrandovidaporcolombia.org
          #                           (o la IP de tu servidor)
          #
          #  FTP_USERNAME  → ⚠️  En Namecheap el usuario SIEMPRE lleva el dominio:
          #                  Formato:  usuario@sembrandovidaporcolombia.org
          #                  (NO solo "usuario", debe incluir @dominio)
          #                  Lo ves en cPanel → FTP Accounts
          #
          #  FTP_PASSWORD  → La contraseña de esa cuenta FTP (no la de cPanel)
          # ────────────────────────────────────────────────────────────────────
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # Namecheap requiere FTPS (FTP sobre TLS explícito, puerto 21)
          protocol: ftps
          port: 21

          # En Namecheap el FTP ya apunta DENTRO de public_html,
          # así que la raíz del sitio es simplemente /
          server-dir: /

          # Solo sube los archivos que cambiaron (más rápido a partir del 2.º deploy)
          dangerous-clean-slate: false

          log-level: verbose

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
